apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
data:
  init-db.sql: |
    -- Criação das bases de dados
    CREATE DATABASE IF NOT EXISTS balances;
    CREATE DATABASE IF NOT EXISTS ledger;

    -- Criação de um usuário e concessão de privilégios
    GRANT ALL PRIVILEGES ON balances.* TO 'admin'@'%';
    GRANT ALL PRIVILEGES ON ledger.* TO 'admin'@'%';
    FLUSH PRIVILEGES;
