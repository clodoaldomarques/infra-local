apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack-deployment
  labels:
    com.job.service: localstack-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      com.job.service: localstack-deployment
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        com.job.service: localstack-deployment
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      containers:
      - name: localstack-main
        image: localstack/localstack:3.7.0
        imagePullPolicy: IfNotPresent
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          value: us-east-1
        - name: SERVICES
          value: sqs,sns,dynamodb
        - name: PERSISTENCE
          value: "1"
        - name: DATA_DIR
          value: /var/lib/localstack
        - name: LS_LOG
          value: warn                    # Reduz logs (opções: trace, debug, info, warn, error)
        - name: DEBUG
          value: "0"                     # Mude para 1 se precisar debugar
        - name: DISABLE_CORS_CHECKS
          value: "1"                     # Opcional: desabilita CORS para dev
        - name: SKIP_SIGNATURE_VALIDATION
          value: "1"                     # Opcional: simplifica assinatura para dev
        ports:
        - name: edge
          containerPort: 4566
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /_localstack/health
            port: 4566
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_localstack/health
            port: 4566
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: localstack-storage
          mountPath: /var/lib/localstack
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false   # LocalStack precisa escrever no /var/lib/localstack
      volumes:
      - name: localstack-storage
        persistentVolumeClaim:
          claimName: localstack-claim