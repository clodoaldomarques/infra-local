apiVersion: v1
kind: Service
metadata:
  labels:
    com.job.service: localstack-service
  name: localstack-service
spec:
  type: NodePort
  ports:
    - port: 4566
      name: edge
      targetPort: 4566
      nodePort: 30002
    - port: 4571
      name: es
      targetPort: 4571
      nodePort: 30003
  selector:
    com.job.service: localstack-deployment