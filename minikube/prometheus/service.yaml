apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  labels:
    com.job.service: prometheus
spec:
  type: NodePort
  ports:
    - port: 9090
      name: web
      targetPort: 9090
      nodePort: 30090     # ajuste conforme disponível (range 30000-32767)
  selector:
    com.job.service: prometheus