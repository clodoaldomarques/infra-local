apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    com.job.service: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    # Regras de alerta (opcional)
    rule_files:
      # - "alerts.yml"

    scrape_configs:
      # Coleta o próprio Prometheus
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Coleta métricas do OpenTelemetry Collector (porta 8888)
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector-service:8888']

      # Exemplo: coleta de métricas de aplicações comuns
      # - job_name: 'kubernetes-pods'
      #   kubernetes_sd_configs:
      #     - role: pod
      #   relabel_configs:
      #     - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      #       action: keep
      #       regex: true