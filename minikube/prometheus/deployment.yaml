apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-deployment
  labels:
    com.job.service: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      com.job.service: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        com.job.service: prometheus
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 60
      containers:
      - name: prometheus
        image: prom/prometheus:v3.2.1   # use versão estável mais recente
        imagePullPolicy: IfNotPresent
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=15d'
          - '--web.enable-lifecycle'    # permite recarregar config via POST /-/reload
        ports:
        - name: web
          containerPort: 9090
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
          readOnly: true
        - name: prometheus-storage
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: prometheus-storage
        persistentVolumeClaim:
          claimName: prometheus-claim   # você precisa criar este PVC ou usar emptyDir para teste
        # Para testes locais sem PVC, troque por:
        # emptyDir: {}