apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  labels:
    com.job.service: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      com.job.service: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        com.job.service: grafana
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 60
      containers:
      - name: grafana
        image: grafana/grafana:11.5.2   # use versão estável mais recente
        imagePullPolicy: IfNotPresent
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"   # Mude para uma senha segura ou use secret
        - name: GF_INSTALL_PLUGINS
          value: ""        # Ex: "grafana-piechart-panel"
        ports:
        - name: web
          containerPort: 3000
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
          readOnly: true
        - name: grafana-storage
          mountPath: /var/lib/grafana
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-claim   # opcional, veja nota abaixo
        # Para testes sem persistência, use emptyDir:
        # emptyDir: {}