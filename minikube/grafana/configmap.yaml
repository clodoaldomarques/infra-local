apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    com.job.service: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090   # nome do service do Prometheus
        isDefault: true
        editable: false